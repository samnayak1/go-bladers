services:
  rtmp:
    image: alfg/nginx-rtmp
    container_name: rtmp-server
    ports: 
      - "8080:80"  
      - "1935:1935" 
    depends_on:
      - app
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf.custom
      - ./hls:/opt/data/hls
      - ./thumbnails:/opt/data/thumbnails
    entrypoint: ["nginx", "-c", "/etc/nginx/nginx.conf.custom"]

  app:
    build: .
    container_name: express-app
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - ./hls:/opt/data/hls
      - ./thumbnails:/opt/data/thumbnails
    command: npm run dev
    env_file:
      - .env
    depends_on:
      mongo:
        condition: service_started
    environment:
      - MONGODB_URI=${MONGODB_URI}
      - COGNITO_USER_POOL_ID=${COGNITO_USER_POOL_ID}
      - COGNITO_CLIENT_ID=${COGNITO_CLIENT_ID}
      - COGNITO_CLIENT_SECRET=${COGNITO_CLIENT_SECRET}
      - AWS_REGION=${AWS_REGION}

  mongo:
    image: mongo:7
    container_name: mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=streamdb
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD}
    command: mongod --quiet #only allow warning and error logs



volumes:
  mongo_data:
