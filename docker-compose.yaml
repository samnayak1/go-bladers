services:
  rtmp:
    build:
      context: .
      dockerfile: Dockerfile.rtmp
      args:
        NGINX_CONFIG: nginx.conf

    container_name: rtmp-server

    ports:
    - "1935:1935"
    - "8080:80"

    volumes:
    - ./hls:/opt/data/hls
    - ./thumbnails:/opt/data/thumbnails

    restart: unless-stopped

  app:
    build: .

    container_name: express-app

  
    ports:
      - "3000:3000"

    volumes:
      - ./hls:/opt/data/hls
      - ./thumbnails:/opt/data/thumbnails
      - ./logs:/opt/data/logs

    env_file:
      - .env

    depends_on:
      mongo:
        condition: service_started

      rtmp:
        condition: service_started

    environment:
      - MONGODB_URI=${MONGODB_URI}
      - COGNITO_USER_POOL_ID=${COGNITO_USER_POOL_ID}
      - COGNITO_CLIENT_ID=${COGNITO_CLIENT_ID}
      - COGNITO_CLIENT_SECRET=${COGNITO_CLIENT_SECRET}
      - AWS_REGION=${AWS_REGION}
      - NODE_ENV=production

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "pm2", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  mongo:
    image: mongo:7

    container_name: mongo

    ports:
      - "27017:27017"

    volumes:
      - mongo_data:/data/db

    environment:
      - MONGO_INITDB_DATABASE=streamdb
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD}

    command: mongod --quiet

    restart: unless-stopped

  permissions:
    image: alpine
    volumes:
      - ./hls:/opt/data/hls
    command:
    - sh
    - -c
    - |
      while true; do
        find /opt/data/hls -type d -exec chmod 755 {} ';'
        find /opt/data/hls -type f -exec chmod 644 {} ';'
        sleep 1
      done

volumes:
  mongo_data:

