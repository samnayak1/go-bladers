services:
  rtmp:
    image: alfg/nginx-rtmp
    container_name: rtmp-server
    ports: 
      - "8080:80"  
      - "1935:1935" 
    depends_on:
      - app
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf.custom
      - ./hls:/opt/data/hls
    entrypoint: ["nginx", "-c", "/etc/nginx/nginx.conf.custom"]

  app:
    build: .
    container_name: express-app
    ports:
      - "3000:3000"
    volumes:
      - .:/app
    command: npm run dev
    depends_on:
      mongo:
        condition: service_started
      vault:
        condition: service_started

  mongo:
    image: mongo:7
    container_name: mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    depends_on:
      - vault
    environment:
      - MONGO_INITDB_DATABASE=streamdb

  vault:
    image: hashicorp/vault:1.13.3
    container_name: vault
    ports:
      - "8200:8200"      #TODO: dont expose port
    volumes:
      - vault_data:/vault/data
      - ./vault.hcl:/vault/config/vault.hcl
    entrypoint: vault server -config=/vault/config/vault.hcl
    cap_add:
      - IPC_LOCK
   

volumes:
  mongo_data:
  vault_data: